services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-reqst}
      POSTGRES_USER: ${POSTGRES_USER:-reqst}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-reqst}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-reqst} -d ${POSTGRES_DB:-reqst}"]
      interval: 5s
      timeout: 3s
      retries: 20

  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      APP_RUNTIME: api
      DATABASE_URL: ${DATABASE_URL:-postgres://reqst:reqst@postgres:5432/reqst?sslmode=disable}
      METRICS_PORT: ${API_METRICS_PORT:-9090}
    ports:
      - "${HTTP_PORT:-8080}:8080"
      - "${API_METRICS_PORT:-9090}:9090"

  blockchain_watcher:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      APP_RUNTIME: watcher
      DATABASE_URL: ${DATABASE_URL:-postgres://reqst:reqst@postgres:5432/reqst?sslmode=disable}
      METRICS_PORT: ${WATCHER_METRICS_PORT:-9091}
    ports:
      - "${WATCHER_METRICS_PORT:-9091}:9091"

  telegram_bot_worker:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      APP_RUNTIME: bot
      DATABASE_URL: ${DATABASE_URL:-postgres://reqst:reqst@postgres:5432/reqst?sslmode=disable}
      METRICS_PORT: ${BOT_METRICS_PORT:-9092}
    ports:
      - "${BOT_METRICS_PORT:-9092}:9092"

  frontend_public:
    build:
      context: .
      dockerfile: frontend-public/Dockerfile
    restart: unless-stopped
    depends_on:
      - api

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-}
    restart: unless-stopped
    depends_on:
      - api
      - frontend_public
    ports:
      - "3000:80"
      - "5173:80"

volumes:
  postgres_data:
